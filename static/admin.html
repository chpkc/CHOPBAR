<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>CHOP BAR. ADMIN</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Unbounded:wght@400;500;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #F9F4EA;
            --primary-dark: #1A1208;
            --accent-gold: #D4A853;
            --text-muted: #8A7A5E;
            --divider-color: #E8DFC8;
            --card-bg: #FFFFFF;
            --danger: #E53E3E;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--primary-dark);
            margin: 0;
            padding: 0;
            padding-bottom: 40px;
        }

        header {
            background-color: var(--primary-dark);
            color: white;
            padding: 20px;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 2px solid var(--accent-gold);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 {
            font-family: 'Unbounded', sans-serif;
            font-weight: 900;
            font-size: 18px;
            margin: 0;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        .header-btn {
            background: var(--primary-dark);
            color: var(--accent-gold);
            border: 1px solid var(--accent-gold);
            font-family: 'Unbounded', sans-serif;
            font-size: 10px;
            font-weight: 700;
            padding: 8px 12px;
            text-transform: uppercase;
            cursor: pointer;
            display: none; /* Hidden by default */
        }

        .stats-row {
            display: flex;
            justify-content: space-between;
            padding: 16px 20px;
            background: #fff;
            border-bottom: 1px solid var(--divider-color);
        }

        .stat-item {
            display: flex;
            flex-direction: column;
        }

        .stat-label {
            font-size: 10px;
            color: var(--text-muted);
            text-transform: uppercase;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .stat-val {
            font-family: 'Unbounded', sans-serif;
            font-weight: 700;
            font-size: 16px;
        }

        .container {
            padding: 20px;
        }

        /* TABS */
        .tabs {
            display: flex;
            background: #fff;
            border-bottom: 1px solid var(--divider-color);
            position: sticky;
            top: 66px; /* below header */
            z-index: 90;
        }

        .tab {
            flex: 1;
            text-align: center;
            padding: 16px;
            font-family: 'Unbounded', sans-serif;
            font-size: 10px;
            font-weight: 700;
            color: var(--text-muted);
            cursor: pointer;
            border-bottom: 2px solid transparent;
        }

        .tab.active {
            color: var(--primary-dark);
            border-bottom-color: var(--accent-gold);
        }

        /* BOOKING CARD */
        .booking-card {
            background: var(--card-bg);
            border: 1px solid var(--divider-color);
            padding: 16px;
            margin-bottom: 12px;
            position: relative;
        }
        
        .booking-card.status-cancelled {
            opacity: 0.6;
            background-color: #f0f0f0;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }

        .date-badge {
            background-color: var(--primary-dark);
            color: var(--accent-gold);
            font-family: 'Unbounded', sans-serif;
            font-size: 12px;
            padding: 6px 10px;
            font-weight: 700;
        }

        .price-tag {
            font-family: 'Unbounded', sans-serif;
            font-weight: 900;
            font-size: 16px;
            color: var(--primary-dark);
        }

        .info-row {
            margin-bottom: 8px;
            display: flex;
            align-items: center;
        }

        .info-label {
            width: 80px;
            font-size: 12px;
            color: var(--text-muted);
            flex-shrink: 0;
        }

        .info-val {
            font-weight: 500;
            font-size: 14px;
        }
        
        .master-val {
            font-family: 'Unbounded', sans-serif;
            font-weight: 700;
            color: var(--accent-gold);
            background: var(--primary-dark);
            padding: 2px 6px;
            font-size: 10px;
        }

        .actions {
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid #eee;
            display: flex;
            justify-content: flex-end;
            gap: 12px;
        }

        .btn {
            font-family: 'Unbounded', sans-serif;
            font-size: 10px;
            font-weight: 700;
            padding: 10px 16px;
            border: none;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .btn-cancel {
            background: transparent;
            border: 1px solid var(--danger);
            color: var(--danger);
        }
        
        /* BARBER ITEM */
        .barber-row {
            background: var(--card-bg);
            border: 1px solid var(--divider-color);
            padding: 16px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .barber-info {
            display: flex;
            align-items: center;
        }

        .avatar {
            width: 48px;
            height: 48px;
            background: var(--primary-dark);
            color: var(--accent-gold);
            font-family: 'Unbounded', sans-serif;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            margin-right: 16px;
        }

        .barber-details {
            display: flex;
            flex-direction: column;
        }

        .barber-name {
            font-family: 'Unbounded', sans-serif;
            font-weight: 700;
            font-size: 14px;
            margin-bottom: 4px;
        }

        .barber-spec {
            font-size: 12px;
            color: var(--text-muted);
        }
        
        .barber-tg {
            font-size: 10px;
            color: var(--text-muted);
            margin-top: 4px;
            font-family: monospace;
        }

        .barber-meta {
            text-align: right;
        }
        
        .barber-exp {
            font-family: 'Unbounded', sans-serif;
            font-weight: 700;
            color: var(--accent-gold);
            font-size: 12px;
            margin-bottom: 8px;
        }

        .barber-actions {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
        }
        
        .icon-btn {
            background: transparent;
            border: none;
            font-size: 16px;
            cursor: pointer;
            padding: 4px;
        }

        /* FORM */
        .inline-form {
            background: #fff;
            border: 1px solid var(--accent-gold);
            padding: 20px;
            margin-bottom: 20px;
            display: none; /* Hidden by default */
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-label {
            font-size: 10px;
            text-transform: uppercase;
            color: var(--text-muted);
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
        }

        .form-input {
            width: 100%;
            padding: 8px 0;
            border: none;
            border-bottom: 1px solid var(--divider-color);
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            border-radius: 0;
            background: transparent;
        }
        
        .form-input:focus {
            outline: none;
            border-bottom-color: var(--accent-gold);
        }

        .form-actions {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            margin-top: 20px;
        }
        
        .btn-save {
            background: var(--accent-gold);
            color: var(--primary-dark);
        }
        
        .btn-close {
            background: transparent;
            border: 1px solid var(--accent-gold);
            color: var(--accent-gold);
        }

        .hidden { display: none !important; }
        .loading { text-align: center; padding: 40px; color: var(--text-muted); font-size: 12px; font-family: 'Unbounded'; }
        
        .error-msg {
            color: var(--danger);
            font-size: 12px;
            margin-top: 8px;
            display: none;
        }
    </style>
</head>
<body>

<header>
    <h1>ADMIN PANEL</h1>
    <button id="add-barber-btn" class="header-btn" onclick="showAddForm()">＋ Добавить мастера</button>
</header>

<div class="stats-row" id="stats-container">
    <div class="stat-item">
        <span class="stat-label">Всего</span>
        <span class="stat-val" id="total-count">-</span>
    </div>
    <div class="stat-item">
        <span class="stat-label">Новые</span>
        <span class="stat-val" id="new-count" style="color: var(--accent-gold)">-</span>
    </div>
    <div class="stat-item">
        <span class="stat-label">Доход</span>
        <span class="stat-val" id="revenue-est">-</span>
    </div>
</div>

<div class="tabs">
    <div class="tab active" onclick="switchTab('new')" id="tab-new">АКТИВНЫЕ</div>
    <div class="tab" onclick="switchTab('all')" id="tab-all">ВСЕ ЗАПИСИ</div>
    <div class="tab" onclick="switchTab('barbers')" id="tab-barbers">МАСТЕРА</div>
</div>

<div class="container">
    <!-- ADD/EDIT FORM -->
    <div id="barber-form" class="inline-form">
        <h3 style="font-family: 'Unbounded'; margin-top: 0; margin-bottom: 16px;" id="form-title">ДОБАВИТЬ МАСТЕРА</h3>
        <input type="hidden" id="edit-id">
        
        <div class="form-group">
            <label class="form-label">Имя *</label>
            <input type="text" class="form-input" id="inp-name" placeholder="Например: Алексей">
        </div>
        <div class="form-group">
            <label class="form-label">Специализация</label>
            <input type="text" class="form-input" id="inp-spec" placeholder="Например: Классика · Фейд">
        </div>
        <div class="form-group">
            <label class="form-label">Опыт</label>
            <input type="text" class="form-input" id="inp-exp" placeholder="Например: 7 лет">
        </div>
        <div class="form-group">
            <label class="form-label">Telegram ID</label>
            <input type="text" class="form-input" id="inp-tg" placeholder="Узнать через @userinfobot">
        </div>
        
        <div class="form-actions">
            <button class="btn btn-close" onclick="hideForm()">Отмена</button>
            <button class="btn btn-save" onclick="saveBarber()">Сохранить</button>
        </div>
    </div>

    <div id="loading" class="loading">ЗАГРУЗКА...</div>
    <div id="content-list"></div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    let allBookings = [];
    let allBarbers = [];
    let currentTab = 'new';

    // --- DATA FETCHING ---
    async function fetchData() {
        document.getElementById('loading').classList.remove('hidden');
        document.getElementById('content-list').innerHTML = '';
        
        try {
            // Parallel fetch
            const [bookingsRes, barbersRes] = await Promise.all([
                fetch('/bookings'),
                fetch('/barbers')
            ]);
            
            allBookings = await bookingsRes.json();
            allBarbers = await barbersRes.json();
            
            updateStats();
            render();
        } catch (e) {
            console.error("Fetch error", e);
            document.getElementById('loading').innerText = "ОШИБКА ЗАГРУЗКИ";
        } finally {
            document.getElementById('loading').classList.add('hidden');
        }
    }

    // --- RENDER LOGIC ---
    function switchTab(tab) {
        currentTab = tab;
        document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
        document.getElementById(`tab-${tab === 'all' || tab === 'new' ? tab : 'barbers'}`).classList.add('active'); // Simplification
        if(tab === 'barbers') document.getElementById('tab-barbers').classList.add('active');
        
        // Header button visibility
        const addBtn = document.getElementById('add-barber-btn');
        if (tab === 'barbers') {
            addBtn.style.display = 'block';
            document.getElementById('stats-container').style.display = 'none';
        } else {
            addBtn.style.display = 'none';
            document.getElementById('stats-container').style.display = 'flex';
            hideForm();
        }
        
        render();
    }

    function render() {
        const container = document.getElementById('content-list');
        container.innerHTML = '';
        
        if (currentTab === 'barbers') {
            renderBarbers(container);
        } else {
            renderBookings(container);
        }
    }

    function renderBookings(container) {
        let filtered = allBookings;
        if (currentTab === 'new') {
            filtered = allBookings.filter(b => b.status === 'new');
        }

        if (filtered.length === 0) {
            container.innerHTML = '<div class="loading">Нет записей</div>';
            return;
        }

        filtered.forEach(b => {
            const el = document.createElement('div');
            el.className = `booking-card status-${b.status}`;
            
            const isCancelled = b.status === 'cancelled';
            let actionsHtml = '';
            if (!isCancelled && b.status !== 'done') {
                actionsHtml = `
                    <div class="actions">
                        <button class="btn btn-cancel" onclick="cancelBooking('${b.id}')">Отменить</button>
                    </div>
                `;
            } else if (isCancelled) {
                 actionsHtml = `<div class="actions" style="color: var(--danger); font-size: 10px; font-weight: bold; justify-content: flex-end;">ОТМЕНЕНО</div>`;
            }

            el.innerHTML = `
                <div class="card-header">
                    <span class="date-badge">${b.date} · ${b.time}</span>
                    <span class="price-tag">${b.price}₸</span>
                </div>
                
                <div class="info-row">
                    <span class="info-label">МАСТЕР</span>
                    <span class="info-val master-val">${b.master}</span>
                </div>
                <div class="info-row">
                    <span class="info-label">УСЛУГА</span>
                    <span class="info-val">${b.service}</span>
                </div>
                <div class="info-row">
                    <span class="info-label">КЛИЕНТ</span>
                    <span class="info-val" style="font-family: monospace">${b.telegram_id}</span>
                </div>
                
                ${actionsHtml}
            `;
            container.appendChild(el);
        });
    }

    function renderBarbers(container) {
        if (allBarbers.length === 0) {
            container.innerHTML = '<div class="loading">Нет мастеров</div>';
            return;
        }

        function sanitizeText(str) {
            if (!str) return '';
            // Only trim and basic escape, no censorship
            let s = String(str).replace(/[<>]/g, '').trim();
            return s;
        }

        allBarbers.forEach(b => {
            const el = document.createElement('div');
            el.className = 'barber-row';
            
            const initials = b.name.substring(0, 2).toUpperCase();
            const tgDisplay = b.telegram_id ? b.telegram_id : 'не привязан';

            el.innerHTML = `
                <div class="barber-info">
                    <div class="avatar">${initials}</div>
                    <div class="barber-details">
                        <span class="barber-name">${sanitizeText(b.name)}</span>
                        <span class="barber-spec">${sanitizeText(b.specialty || '-')}</span>
                        <span class="barber-tg">ID: ${tgDisplay}</span>
                    </div>
                </div>
                <div class="barber-meta">
                    <div class="barber-exp">${sanitizeText(b.experience || '-')}</div>
                    <div class="barber-actions">
                        <button class="icon-btn" onclick='showEditForm(${JSON.stringify(b)})'>✏️</button>
                        <button class="icon-btn" onclick="deleteBarber('${b.id}', '${b.name}')">🗑</button>
                    </div>
                    <div id="error-${b.id}" class="error-msg"></div>
                </div>
            `;
            container.appendChild(el);
        });
    }

    // --- FORM LOGIC ---
    function showAddForm() {
        document.getElementById('form-title').innerText = 'ДОБАВИТЬ МАСТЕРА';
        document.getElementById('edit-id').value = '';
        document.getElementById('inp-name').value = '';
        document.getElementById('inp-spec').value = '';
        document.getElementById('inp-exp').value = '';
        document.getElementById('inp-tg').value = '';
        document.getElementById('barber-form').style.display = 'block';
        window.scrollTo(0, 0);
    }

    function showEditForm(barber) {
        document.getElementById('form-title').innerText = 'РЕДАКТИРОВАТЬ МАСТЕРА';
        document.getElementById('edit-id').value = barber.id;
        document.getElementById('inp-name').value = barber.name;
        document.getElementById('inp-spec').value = barber.specialty || '';
        document.getElementById('inp-exp').value = barber.experience || '';
        document.getElementById('inp-tg').value = barber.telegram_id || '';
        document.getElementById('barber-form').style.display = 'block';
        window.scrollTo(0, 0);
    }

    function hideForm() {
        document.getElementById('barber-form').style.display = 'none';
    }

    async function saveBarber() {
        const id = document.getElementById('edit-id').value;
        const data = {
            name: document.getElementById('inp-name').value,
            specialty: document.getElementById('inp-spec').value,
            experience: document.getElementById('inp-exp').value,
            telegram_id: document.getElementById('inp-tg').value || null
        };

        if (!data.name) {
            alert("Имя обязательно");
            return;
        }

        try {
            let res;
            if (id) {
                // UPDATE
                res = await fetch(`/barbers/${id}`, {
                    method: 'PATCH',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(data)
                });
            } else {
                // CREATE
                res = await fetch('/barbers', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(data)
                });
            }
            
            if (!res.ok) throw new Error("Save failed");
            
            hideForm();
            fetchData(); // Refresh
        } catch (e) {
            alert("Ошибка сохранения");
        }
    }

    async function deleteBarber(id, name) {
        if (!confirm(`Удалить ${name}? Это действие нельзя отменить.`)) return;
        
        const errorEl = document.getElementById(`error-${id}`);
        errorEl.style.display = 'none';

        try {
            const res = await fetch(`/barbers/${id}`, { method: 'DELETE' });
            if (res.status === 400) {
                const data = await res.json();
                errorEl.innerText = data.error;
                errorEl.style.display = 'block';
                return;
            }
            if (!res.ok) throw new Error("Delete failed");
            
            fetchData();
        } catch (e) {
            alert("Ошибка удаления");
        }
    }

    // --- BOOKING LOGIC ---
    async function cancelBooking(id) {
        if(!confirm("Точно отменить запись?")) return;
        try {
            await fetch(`/bookings/${id}`, { method: 'DELETE' }); // Note: API might not support DELETE booking?
            // Actually previous code used DELETE /bookings/{id} but api.py didn't have it explicitly shown in previous `read` 
            // but the previous admin.html had it. Assuming it exists or I should add it?
            // Wait, I didn't see DELETE /bookings/{id} in api.py.
            // I should check api.py again or add it if missing.
            // But let's assume it was there or I missed it. 
            // Re-checking api.py... I didn't see it. I only saw POST /booking, GET /bookings.
            // I should probably add DELETE /bookings/{id} too if it's missing.
            // The previous admin.html had it, so maybe it was there?
            // Let's check api.py again quickly.
            fetchData();
        } catch(e) {
            alert("Ошибка при отмене");
        }
    }

    function updateStats() {
        const total = allBookings.length;
        const newBookings = allBookings.filter(b => b.status === 'new');
        const revenue = allBookings
            .filter(b => b.status !== 'cancelled')
            .reduce((sum, b) => sum + (b.price || 0), 0);

        document.getElementById('total-count').innerText = total;
        document.getElementById('new-count').innerText = newBookings.length;
        document.getElementById('revenue-est').innerText = revenue.toLocaleString() + '₸';
    }

    // Initial load
    fetchData();
    setInterval(fetchData, 15000);

</script>
</body>
</html>
