<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>CHOP BAR. ADMIN</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Unbounded:wght@400;500;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #F9F4EA;
            --primary-dark: #1A1208;
            --accent-gold: #D4A853;
            --text-muted: #8A7A5E;
            --divider-color: #E8DFC8;
            --card-bg: #FFFFFF;
            --danger: #E53E3E;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--primary-dark);
            margin: 0;
            padding: 0;
            padding-bottom: 40px;
        }

        header {
            background-color: var(--primary-dark);
            color: white;
            padding: 20px;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 2px solid var(--accent-gold);
        }

        h1 {
            font-family: 'Unbounded', sans-serif;
            font-weight: 900;
            font-size: 18px;
            margin: 0;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        .stats-row {
            display: flex;
            justify-content: space-between;
            padding: 16px 20px;
            background: #fff;
            border-bottom: 1px solid var(--divider-color);
        }

        .stat-item {
            display: flex;
            flex-direction: column;
        }

        .stat-label {
            font-size: 10px;
            color: var(--text-muted);
            text-transform: uppercase;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .stat-val {
            font-family: 'Unbounded', sans-serif;
            font-weight: 700;
            font-size: 16px;
        }

        .container {
            padding: 20px;
        }

        .section-title {
            font-family: 'Unbounded', sans-serif;
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 12px;
            padding-left: 4px;
            letter-spacing: 0.1em;
        }

        .booking-card {
            background: var(--card-bg);
            border: 1px solid var(--divider-color);
            padding: 16px;
            margin-bottom: 12px;
            position: relative;
            transition: transform 0.2s;
        }

        .booking-card.status-cancelled {
            opacity: 0.6;
            background-color: #f0f0f0;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }

        .date-badge {
            background-color: var(--primary-dark);
            color: var(--accent-gold);
            font-family: 'Unbounded', sans-serif;
            font-size: 12px;
            padding: 6px 10px;
            font-weight: 700;
            border-radius: 0;
        }

        .price-tag {
            font-family: 'Unbounded', sans-serif;
            font-weight: 900;
            font-size: 16px;
            color: var(--primary-dark);
        }

        .info-row {
            margin-bottom: 8px;
            display: flex;
            align-items: center;
        }

        .info-label {
            width: 80px;
            font-size: 12px;
            color: var(--text-muted);
            flex-shrink: 0;
        }

        .info-val {
            font-weight: 500;
            font-size: 14px;
        }
        
        .master-val {
            font-family: 'Unbounded', sans-serif;
            font-weight: 700;
            color: var(--accent-gold);
            background: var(--primary-dark);
            padding: 2px 6px;
            font-size: 10px;
        }

        .actions {
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid #eee;
            display: flex;
            justify-content: flex-end;
            gap: 12px;
        }

        .btn {
            font-family: 'Unbounded', sans-serif;
            font-size: 10px;
            font-weight: 700;
            padding: 10px 16px;
            border: none;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .btn-cancel {
            background: transparent;
            border: 1px solid var(--danger);
            color: var(--danger);
        }

        .btn-done {
            background: var(--primary-dark);
            color: var(--accent-gold);
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            font-family: 'Unbounded', sans-serif;
            color: var(--text-muted);
            font-size: 12px;
        }

        /* Tabs */
        .tabs {
            display: flex;
            background: #fff;
            border-bottom: 1px solid var(--divider-color);
            position: sticky;
            top: 66px; /* below header */
            z-index: 90;
        }

        .tab {
            flex: 1;
            text-align: center;
            padding: 16px;
            font-family: 'Unbounded', sans-serif;
            font-size: 10px;
            font-weight: 700;
            color: var(--text-muted);
            cursor: pointer;
            border-bottom: 2px solid transparent;
        }

        .tab.active {
            color: var(--primary-dark);
            border-bottom-color: var(--accent-gold);
        }

        .hidden { display: none; }
    </style>
</head>
<body>

<header>
    <h1>ADMIN PANEL</h1>
</header>

<div class="stats-row">
    <div class="stat-item">
        <span class="stat-label">Всего</span>
        <span class="stat-val" id="total-count">-</span>
    </div>
    <div class="stat-item">
        <span class="stat-label">Новые</span>
        <span class="stat-val" id="new-count" style="color: var(--accent-gold)">-</span>
    </div>
    <div class="stat-item">
        <span class="stat-label">Доход</span>
        <span class="stat-val" id="revenue-est">-</span>
    </div>
</div>

<div class="tabs">
    <div class="tab active" onclick="switchTab('new')">АКТИВНЫЕ</div>
    <div class="tab" onclick="switchTab('all')">ВСЕ ЗАПИСИ</div>
</div>

<div class="container">
    <div id="loading" class="loading">ЗАГРУЗКА...</div>
    <div id="bookings-list"></div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    // Theme params
    if (tg.colorScheme === 'dark') {
        // Optional: adjust colors for dark mode if needed
        // For now, keep the brand identity (Gold/Black/Cream)
    }

    let allBookings = [];
    let currentTab = 'new';

    async function fetchBookings() {
        try {
            const res = await fetch('/bookings');
            const data = await res.json();
            allBookings = data;
            updateStats();
            renderList();
        } catch (e) {
            console.error("Fetch error", e);
            document.getElementById('loading').innerText = "ОШИБКА ЗАГРУЗКИ";
        }
    }

    function updateStats() {
        const total = allBookings.length;
        const newBookings = allBookings.filter(b => b.status === 'new');
        const revenue = allBookings
            .filter(b => b.status !== 'cancelled')
            .reduce((sum, b) => sum + (b.price || 0), 0);

        document.getElementById('total-count').innerText = total;
        document.getElementById('new-count').innerText = newBookings.length;
        document.getElementById('revenue-est').innerText = revenue.toLocaleString() + '₸';
    }

    function switchTab(tab) {
        currentTab = tab;
        document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
        event.currentTarget.classList.add('active');
        renderList();
    }

    function renderList() {
        const container = document.getElementById('bookings-list');
        container.innerHTML = '';
        document.getElementById('loading').classList.add('hidden');

        let filtered = allBookings;
        if (currentTab === 'new') {
            filtered = allBookings.filter(b => b.status === 'new');
        }

        if (filtered.length === 0) {
            container.innerHTML = '<div class="loading">Нет записей</div>';
            return;
        }

        filtered.forEach(b => {
            const el = document.createElement('div');
            el.className = `booking-card status-${b.status}`;
            
            // Format Date
            // b.date is YYYY-MM-DD or string
            // Let's display as is or format better
            
            const isCancelled = b.status === 'cancelled';
            const isDone = b.status === 'done';
            
            let actionsHtml = '';
            if (!isCancelled && !isDone) {
                actionsHtml = `
                    <div class="actions">
                        <button class="btn btn-cancel" onclick="cancelBooking('${b.id}')">Отменить</button>
                        <!-- <button class="btn btn-done">Завершить</button> --> 
                    </div>
                `;
            } else if (isCancelled) {
                 actionsHtml = `<div class="actions" style="color: var(--danger); font-size: 10px; font-weight: bold; justify-content: flex-end;">ОТМЕНЕНО</div>`;
            }

            el.innerHTML = `
                <div class="card-header">
                    <span class="date-badge">${b.date} · ${b.time}</span>
                    <span class="price-tag">${b.price}₸</span>
                </div>
                
                <div class="info-row">
                    <span class="info-label">МАСТЕР</span>
                    <span class="info-val master-val">${b.master}</span>
                </div>
                <div class="info-row">
                    <span class="info-label">УСЛУГА</span>
                    <span class="info-val">${b.service}</span>
                </div>
                <div class="info-row">
                    <span class="info-label">КЛИЕНТ</span>
                    <span class="info-val" style="font-family: monospace">${b.telegram_id}</span>
                </div>
                
                ${actionsHtml}
            `;
            container.appendChild(el);
        });
    }

    async function cancelBooking(id) {
        if(!confirm("Точно отменить запись?")) return;
        
        try {
            await fetch(`/bookings/${id}`, { method: 'DELETE' });
            // Refresh
            fetchBookings();
        } catch(e) {
            alert("Ошибка при отмене");
        }
    }

    // Initial load
    fetchBookings();
    
    // Auto refresh every 15s
    setInterval(fetchBookings, 15000);

</script>
</body>
</html>
