
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>CHOP BAR. ADMIN</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Unbounded:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #F9F4EA;
            --primary-dark: #1A1208;
            --accent-gold: #D4A853;
            --text-muted: #8A7A5E;
            --divider-color: #E8DFC8;
            --card-bg: #FFFFFF;
            --danger: #E53E3E;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--primary-dark);
            margin: 0;
            padding: 0;
            padding-bottom: 40px;
        }

        /* HEADER */
        header {
            background-color: var(--primary-dark);
            color: white;
            padding: 16px 20px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }

        .header-label {
            font-family: 'Unbounded', sans-serif;
            font-size: 9px;
            color: var(--accent-gold);
            letter-spacing: 0.2em;
            text-transform: uppercase;
            display: block;
            margin-bottom: 4px;
        }

        h1 {
            font-family: 'Unbounded', sans-serif;
            font-weight: 900;
            font-size: 28px;
            line-height: 0.9;
            margin: 0;
            text-transform: uppercase;
        }

        .live-indicator {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .blink-dot {
            width: 8px;
            height: 8px;
            background-color: var(--accent-gold);
            border-radius: 50%;
            animation: blink 1.5s infinite;
        }

        .live-text {
            font-family: 'Unbounded', sans-serif;
            font-size: 10px;
            color: var(--accent-gold);
            font-weight: 700;
        }

        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0.4; }
            100% { opacity: 1; }
        }

        .ticker-strip {
            background-color: var(--accent-gold);
            color: var(--primary-dark);
            font-family: 'Unbounded', sans-serif;
            font-size: 10px;
            font-weight: 700;
            padding: 4px 0;
            overflow: hidden;
            white-space: nowrap;
            text-transform: uppercase;
        }

        /* STATS ROW */
        .stats-row {
            display: flex;
            background: #F9F4EA;
            border-top: 3px solid var(--primary-dark);
            border-bottom: 3px solid var(--primary-dark);
        }

        .stat-item {
            flex: 1;
            padding: 16px;
            border-right: 1px solid var(--divider-color);
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .stat-item:last-child {
            border-right: none;
        }

        .stat-val {
            font-family: 'Unbounded', sans-serif;
            font-weight: 900;
            font-size: 40px;
            line-height: 1;
            color: var(--primary-dark);
            margin-bottom: 4px;
        }

        .stat-val.gold-text {
            color: var(--accent-gold);
        }

        .stat-label {
            font-family: 'Unbounded', sans-serif;
            font-size: 9px;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: var(--text-muted);
        }

        .container {
            padding: 0;
        }

        /* TABS */
        .tabs {
            display: flex;
            background: #F9F4EA;
            border-bottom: 1px solid var(--divider-color);
            position: sticky;
            top: 105px; /* Adjust based on header height */
            z-index: 90;
        }

        .tab {
            flex: 1;
            text-align: center;
            padding: 16px;
            font-family: 'Unbounded', sans-serif;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-muted);
            cursor: pointer;
            border-bottom: 3px solid transparent;
        }

        .tab.active {
            color: var(--primary-dark);
            border-bottom-color: var(--accent-gold);
        }

        /* BOOKING LIST - NEWSPAPER STYLE */
        .bookings-list {
            padding-bottom: 40px;
        }

        .booking-row {
            margin-bottom: 0;
            animation: fadeUp 0.5s ease forwards;
            opacity: 0;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .date-strip {
            background-color: var(--primary-dark);
            color: white;
            padding: 10px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .date-strip.cancelled {
            background-color: var(--divider-color);
        }

        .date-text {
            font-family: 'Unbounded', sans-serif;
            font-weight: 700;
            font-size: 12px;
            color: var(--accent-gold);
            text-transform: uppercase;
        }
        
        .date-strip.cancelled .date-text {
            color: var(--text-muted);
        }

        .price-text {
            font-family: 'Unbounded', sans-serif;
            font-weight: 900;
            font-size: 16px;
            color: white;
        }
        
        .date-strip.cancelled .price-text {
            color: var(--text-muted);
        }

        .currency {
            color: var(--accent-gold);
        }
        
        .date-strip.cancelled .currency {
             color: var(--text-muted);
        }

        .info-row {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            border-bottom: 1px solid var(--divider-color);
            background-color: #FFFFFF;
        }
        
        .info-row:nth-child(even) {
            background-color: #F9F4EA;
        }
        
        .status-cancelled .info-row {
            opacity: 0.6;
        }

        .label {
            width: 80px;
            flex-shrink: 0;
            font-family: 'Unbounded', sans-serif;
            font-size: 10px;
            text-transform: uppercase;
            color: var(--text-muted);
        }

        .value {
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 14px;
            color: var(--primary-dark);
            flex-grow: 1;
        }

        .master-pill {
            background-color: var(--accent-gold);
            color: var(--primary-dark);
            font-family: 'Unbounded', sans-serif;
            font-weight: 700;
            font-size: 10px;
            padding: 3px 10px;
            display: inline-block;
        }

        .action-row {
            display: flex;
            justify-content: flex-end;
            padding: 12px 16px;
            background-color: #FFFFFF;
            border-bottom: 3px solid var(--bg-color); /* Spacer */
        }
        
        .status-cancelled .action-row {
            display: none;
        }

        .btn-cancel {
            background: transparent;
            border: 1px solid var(--divider-color);
            color: var(--text-muted);
            font-family: 'Unbounded', sans-serif;
            font-size: 10px;
            text-transform: uppercase;
            padding: 8px 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-cancel:hover {
            border-color: #8B3A1A;
            color: #8B3A1A;
        }

        /* BARBERS LIST */
        .barbers-section {
            padding: 20px;
        }

        .section-title {
            font-family: 'Unbounded', sans-serif;
            font-weight: 900;
            font-size: 22px;
            color: var(--primary-dark);
            border-bottom: 2px solid var(--accent-gold);
            padding-bottom: 8px;
            margin-bottom: 16px;
        }

        .barber-item {
            display: flex;
            align-items: center;
            padding: 16px 0;
            border-bottom: 1px solid var(--divider-color);
        }

        .barber-avatar {
            width: 44px;
            height: 44px;
            background-color: var(--primary-dark);
            color: var(--accent-gold);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Unbounded', sans-serif;
            font-weight: 700;
            font-size: 16px;
            margin-right: 16px;
        }

        .barber-info {
            flex-grow: 1;
        }

        .barber-name {
            font-family: 'Unbounded', sans-serif;
            font-weight: 700;
            font-size: 15px;
            color: var(--primary-dark);
            margin-bottom: 4px;
        }

        .barber-spec {
            font-family: 'Inter', sans-serif;
            font-size: 12px;
            color: var(--text-muted);
        }
        
        .barber-tg {
             font-family: 'Inter', sans-serif;
             font-size: 11px;
             color: var(--text-muted);
             margin-top: 2px;
        }

        .barber-meta {
            text-align: right;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 8px;
        }

        .barber-exp {
            font-family: 'Unbounded', sans-serif;
            font-weight: 700;
            font-size: 13px;
            color: var(--accent-gold);
        }

        .barber-actions {
            display: flex;
            gap: 12px;
        }

        .icon-action {
            font-size: 16px;
            color: var(--text-muted);
            cursor: pointer;
        }
        
        .icon-edit:active { color: var(--accent-gold); }
        .icon-delete:active { color: var(--danger); }

        .btn-add {
            display: block;
            width: 100%;
            background: transparent;
            border: 2px solid var(--primary-dark);
            color: var(--primary-dark);
            font-family: 'Unbounded', sans-serif;
            font-weight: 900;
            font-size: 11px;
            text-transform: uppercase;
            padding: 14px;
            margin-top: 20px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-add:active {
            background: var(--primary-dark);
            color: white;
        }
        
        /* DATE HEADER */
        .date-section-header {
            font-family: 'Unbounded', sans-serif;
            font-weight: 900;
            font-size: 13px;
            color: var(--primary-dark);
            display: flex;
            align-items: center;
            padding: 20px 16px 8px 16px;
            text-transform: uppercase;
        }
        
        .date-section-header::after {
            content: '';
            flex-grow: 1;
            height: 1px;
            background-color: var(--primary-dark);
            margin-left: 12px;
        }

        .loading {
            padding: 40px;
            text-align: center;
            font-family: 'Unbounded', sans-serif;
            color: var(--text-muted);
            font-size: 12px;
        }
        
        .hidden { display: none !important; }

        /* FORM MODAL */
        .modal {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(26, 18, 8, 0.9);
            z-index: 200;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal-content {
            background: #F9F4EA;
            padding: 24px;
            width: 100%;
            max-width: 320px;
            border: 2px solid var(--accent-gold);
        }
        
        .modal-title {
            font-family: 'Unbounded', sans-serif;
            font-weight: 900;
            font-size: 18px;
            margin-bottom: 20px;
            text-transform: uppercase;
            color: var(--primary-dark);
        }
        
        .form-group {
            margin-bottom: 16px;
        }
        
        .form-label {
            font-family: 'Unbounded', sans-serif;
            font-size: 10px;
            font-weight: 700;
            margin-bottom: 6px;
            display: block;
            color: var(--text-muted);
            text-transform: uppercase;
        }
        
        .form-input {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--divider-color);
            background: #fff;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            color: var(--primary-dark);
            border-radius: 0;
        }
        
        .form-input:focus {
            outline: none;
            border-color: var(--accent-gold);
        }
        
        .form-actions {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }
        
        .btn-modal {
            flex: 1;
            padding: 12px;
            border: none;
            font-family: 'Unbounded', sans-serif;
            font-weight: 900;
            font-size: 11px;
            text-transform: uppercase;
            cursor: pointer;
        }
        
        .btn-save {
            background: var(--primary-dark);
            color: var(--accent-gold);
        }
        
        .btn-close {
            background: transparent;
            border: 1px solid var(--primary-dark);
            color: var(--primary-dark);
        }
    </style>
</head>
<body>

<header>
    <div class="header-top">
        <div>
            <span class="header-label">ПАВЛОДАР · CHOP</span>
            <h1>АДМИН<br>ПАНЕЛЬ</h1>
        </div>
        <div class="live-indicator">
            <div class="blink-dot"></div>
            <span class="live-text">LIVE</span>
        </div>
    </div>
    <div class="ticker-strip">
        CHOP BARBERSHOP · АДМИН ПАНЕЛЬ · ПАВЛОДАР · УПРАВЛЕНИЕ · CHOP BARBERSHOP · АДМИН ПАНЕЛЬ · ПАВЛОДАР · УПРАВЛЕНИЕ ·
    </div>
</header>

<div class="stats-row">
    <div class="stat-item">
        <span class="stat-val" id="stat-total">0</span>
        <span class="stat-label">ВСЕГО</span>
    </div>
    <div class="stat-item">
        <span class="stat-val" id="stat-new">0</span>
        <span class="stat-label">НОВЫЕ</span>
    </div>
    <div class="stat-item">
        <span class="stat-val gold-text" id="stat-income">0</span>
        <span class="stat-label">ДОХОД</span>
    </div>
</div>

<div class="tabs">
    <div class="tab active" onclick="switchTab('active')">АКТИВНЫЕ</div>
    <div class="tab" onclick="switchTab('all')">ВСЕ ЗАПИСИ</div>
    <div class="tab" onclick="switchTab('barbers')">МАСТЕРА</div>
</div>

<div id="content-bookings" class="container bookings-list">
    <div id="loading" class="loading">ЗАГРУЗКА ДАННЫХ...</div>
    <div id="bookings-list"></div>
</div>

<div id="content-barbers" class="container hidden barbers-section">
    <div class="section-title">МАСТЕРА</div>
    <div id="barbers-list"></div>
    <button class="btn-add" onclick="showAddBarberForm()">+ Добавить мастера</button>
</div>

<!-- Modal for Add/Edit Barber -->
<div id="barber-modal" class="modal hidden">
    <div class="modal-content">
        <div class="modal-title" id="modal-title">НОВЫЙ МАСТЕР</div>
        <input type="hidden" id="barber-id">
        
        <div class="form-group">
            <label class="form-label">Имя</label>
            <input type="text" id="barber-name-input" class="form-input" placeholder="Имя мастера">
        </div>
        
        <div class="form-group">
            <label class="form-label">Специализация</label>
            <input type="text" id="barber-spec-input" class="form-input" placeholder="Например: Топ-Барбер">
        </div>
        
        <div class="form-group">
            <label class="form-label">Опыт работы</label>
            <input type="text" id="barber-exp-input" class="form-input" placeholder="Например: 3 года">
        </div>
        
        <div class="form-group">
            <label class="form-label">Telegram ID</label>
            <input type="text" id="barber-tg-input" class="form-input" placeholder="Цифры ID">
        </div>
        
        <div class="form-actions">
            <button class="btn-modal btn-close" onclick="closeModal()">Отмена</button>
            <button class="btn-modal btn-save" onclick="saveBarber()">Сохранить</button>
        </div>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    let bookingsData = [];
    let barbersData = [];
    let currentTab = 'active';

    async function init() {
        await Promise.all([fetchBookings(), fetchBarbers()]);
        render();
        
        // Setup stats refresh flash
        setInterval(() => {
            document.querySelector('.stats-row').style.borderTopColor = 'var(--accent-gold)';
            setTimeout(() => {
                document.querySelector('.stats-row').style.borderTopColor = 'var(--primary-dark)';
            }, 300);
            fetchBookings(true); // silent update
        }, 30000);
    }

    async function fetchBookings(silent = false) {
        if(!silent) document.getElementById('loading').classList.remove('hidden');
        try {
            console.log("Fetching bookings...");
            const res = await fetch('/admin/bookings', { cache: "no-store" });
            if (!res.ok) throw new Error(`HTTP error! status: ${res.status}`);
            bookingsData = await res.json();
            console.log("Bookings loaded:", bookingsData.length);
            
            updateStats();
            if(!silent) renderBookings();
        } catch (e) {
            console.error("Error loading bookings:", e);
            document.getElementById('bookings-list').innerHTML = `<div class="loading" style="color:red">Ошибка: ${e.message}</div>`;
        } finally {
            if(!silent) document.getElementById('loading').classList.add('hidden');
        }
    }

    async function fetchBarbers() {
        try {
            const res = await fetch('/barbers', { cache: "no-store" });
            barbersData = await res.json();
            renderBarbers();
        } catch (e) {
            console.error(e);
        }
    }

    function updateStats() {
        const total = bookingsData.length;
        const newBookings = bookingsData.filter(b => b.status === 'new').length;
        const income = bookingsData
            .filter(b => b.status !== 'cancelled')
            .reduce((sum, b) => sum + (b.price || 0), 0);

        document.getElementById('stat-total').innerText = total;
        document.getElementById('stat-new').innerText = newBookings;
        document.getElementById('stat-income').innerText = income.toLocaleString('ru-RU') + '₸';
    }

    function switchTab(tab) {
        currentTab = tab;
        document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
        event.currentTarget.classList.add('active');

        if (tab === 'barbers') {
            document.getElementById('content-bookings').classList.add('hidden');
            document.getElementById('content-barbers').classList.remove('hidden');
        } else {
            document.getElementById('content-bookings').classList.remove('hidden');
            document.getElementById('content-barbers').classList.add('hidden');
            renderBookings();
        }
    }

    function formatDate(dateStr) {
        const date = new Date(dateStr);
        const day = date.getDate();
        const months = ['ЯНВ', 'ФЕВ', 'МАР', 'АПР', 'МАЙ', 'ИЮН', 'ИЮЛ', 'АВГ', 'СЕН', 'ОКТ', 'НОЯ', 'ДЕК'];
        const month = months[date.getMonth()];
        const days = ['ВС', 'ПН', 'ВТ', 'СР', 'ЧТ', 'ПТ', 'СБ'];
        const weekDay = days[date.getDay()];
        return `${weekDay} ${day} ${month}`;
    }

    function renderBookings() {
        const container = document.getElementById('bookings-list');
        container.innerHTML = '';

        let filtered = bookingsData;
        if (currentTab === 'active') {
            filtered = bookingsData.filter(b => b.status === 'new');
        }

        // Sort by date desc
        filtered.sort((a, b) => new Date(b.date + 'T' + b.time) - new Date(a.date + 'T' + a.time));

        let lastDate = null;

        filtered.forEach((b, index) => {
            const isCancelled = b.status === 'cancelled';
            
            // Date Section Header (for grouping)
            if (b.date !== lastDate) {
                 const dateHeader = document.createElement('div');
                 dateHeader.className = 'date-section-header';
                 const d = new Date(b.date);
                 const options = { day: 'numeric', month: 'long' };
                 dateHeader.innerText = d.toLocaleDateString('ru-RU', options);
                 container.appendChild(dateHeader);
                 lastDate = b.date;
            }

            const el = document.createElement('div');
            el.className = `booking-row ${isCancelled ? 'status-cancelled' : ''}`;
            el.style.animationDelay = `${index * 40}ms`;
            
            const dateDisplay = formatDate(b.date) + ' · ' + b.time;
            const priceDisplay = (b.price || 0).toLocaleString('ru-RU');
            const statusText = isCancelled ? 'ОТМЕНЕНО' : '';

            el.innerHTML = `
                <div class="date-strip ${isCancelled ? 'cancelled' : ''}">
                    <span class="date-text">${dateDisplay} ${statusText ? '— ' + statusText : ''}</span>
                    <span class="price-text">${priceDisplay} <span class="currency">₸</span></span>
                </div>
                <div class="info-row">
                    <span class="label">Мастер</span>
                    <span class="value"><span class="master-pill">${b.master}</span></span>
                </div>
                <div class="info-row">
                    <span class="label">Услуга</span>
                    <span class="value">${b.service}</span>
                </div>
                <div class="info-row">
                    <span class="label">Клиент</span>
                    <span class="value">ID: ${b.telegram_id}</span>
                </div>
                <div class="action-row">
                    <button class="btn-cancel" onclick="cancelBooking('${b.id}')">ОТМЕНИТЬ</button>
                </div>
            `;
            container.appendChild(el);
        });
    }

    function renderBarbers() {
        const container = document.getElementById('barbers-list');
        container.innerHTML = '';
        
        barbersData.forEach(b => {
            const el = document.createElement('div');
            el.className = 'barber-item';
            
            const initials = b.name.split(' ').map(n => n[0]).join('').substring(0,2).toUpperCase();
            
            el.innerHTML = `
                <div class="barber-avatar">${initials}</div>
                <div class="barber-info">
                    <div class="barber-name">${b.name}</div>
                    <div class="barber-spec">${b.specialty || 'Мастер'}</div>
                    <div class="barber-tg">ID: ${b.telegram_id || '-'}</div>
                </div>
                <div class="barber-meta">
                    <div class="barber-exp">${b.experience || '1 год'}</div>
                    <div class="barber-actions">
                        <span class="icon-action icon-edit" onclick="editBarber('${b.id}')">✎</span>
                        <span class="icon-action icon-delete" onclick="deleteBarber('${b.id}')">✕</span>
                    </div>
                </div>
            `;
            container.appendChild(el);
        });
    }

    async function cancelBooking(id) {
        if(!confirm('Отменить запись?')) return;
        try {
            await fetch(`/bookings/${id}`, { method: 'DELETE' });
            fetchBookings(); // refresh
        } catch (e) {
            alert('Ошибка: ' + e);
        }
    }
    
    // --- BARBER FORM LOGIC ---
    function showAddBarberForm() {
        document.getElementById('modal-title').innerText = "НОВЫЙ МАСТЕР";
        document.getElementById('barber-id').value = "";
        document.getElementById('barber-name-input').value = "";
        document.getElementById('barber-spec-input').value = "";
        document.getElementById('barber-exp-input').value = "";
        document.getElementById('barber-tg-input').value = "";
        document.getElementById('barber-modal').classList.remove('hidden');
    }
    
    function editBarber(id) {
        const b = barbersData.find(item => item.id === id);
        if (!b) return;
        
        document.getElementById('modal-title').innerText = "РЕДАКТИРОВАТЬ";
        document.getElementById('barber-id').value = b.id;
        document.getElementById('barber-name-input').value = b.name;
        document.getElementById('barber-spec-input').value = b.specialty || "";
        document.getElementById('barber-exp-input').value = b.experience || "";
        document.getElementById('barber-tg-input').value = b.telegram_id || "";
        document.getElementById('barber-modal').classList.remove('hidden');
    }
    
    function closeModal() {
        document.getElementById('barber-modal').classList.add('hidden');
    }
    
    async function saveBarber() {
        const id = document.getElementById('barber-id').value;
        const data = {
            name: document.getElementById('barber-name-input').value,
            specialty: document.getElementById('barber-spec-input').value,
            experience: document.getElementById('barber-exp-input').value,
            telegram_id: document.getElementById('barber-tg-input').value
        };
        
        if (!data.name) {
            alert("Введите имя мастера");
            return;
        }
        
        try {
            let res;
            if (id) {
                // Update
                res = await fetch(`/barbers/${id}`, {
                    method: 'PATCH',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(data)
                });
            } else {
                // Create
                res = await fetch('/barbers', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(data)
                });
            }
            
            if (res.ok) {
                closeModal();
                fetchBarbers();
            } else {
                alert("Ошибка сохранения");
            }
        } catch (e) {
            alert("Ошибка сети: " + e);
        }
    }
