
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>CHOP BAR. BARBER</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Unbounded:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #F9F4EA;
            --primary-dark: #1A1208;
            --accent-gold: #D4A853;
            --text-muted: #8A7A5E;
            --divider-color: #E8DFC8;
            --card-bg: #FFFFFF;
            --danger: #E53E3E;
            --success: #2E7D32;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--primary-dark);
            margin: 0;
            padding: 0;
            padding-bottom: 40px;
        }

        /* HEADER */
        header {
            background-color: var(--primary-dark);
            color: white;
            padding: 16px 20px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }

        .header-label {
            font-family: 'Unbounded', sans-serif;
            font-size: 9px;
            color: var(--accent-gold);
            letter-spacing: 0.2em;
            text-transform: uppercase;
            display: block;
            margin-bottom: 4px;
        }

        h1 {
            font-family: 'Unbounded', sans-serif;
            font-weight: 900;
            font-size: 24px;
            line-height: 1;
            margin: 0;
            text-transform: uppercase;
            color: white;
        }
        
        .barber-name-highlight {
            color: var(--accent-gold);
        }

        .live-indicator {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .blink-dot {
            width: 8px;
            height: 8px;
            background-color: var(--accent-gold);
            border-radius: 50%;
            animation: blink 1.5s infinite;
        }

        .live-text {
            font-family: 'Unbounded', sans-serif;
            font-size: 10px;
            color: var(--accent-gold);
            font-weight: 700;
        }

        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0.4; }
            100% { opacity: 1; }
        }

        .ticker-strip {
            background-color: var(--accent-gold);
            color: var(--primary-dark);
            font-family: 'Unbounded', sans-serif;
            font-size: 10px;
            font-weight: 700;
            padding: 4px 0;
            overflow: hidden;
            white-space: nowrap;
            text-transform: uppercase;
        }

        /* STATS ROW */
        .stats-row {
            display: flex;
            background: #F9F4EA;
            border-top: 3px solid var(--primary-dark);
            border-bottom: 3px solid var(--primary-dark);
        }

        .stat-item {
            flex: 1;
            padding: 16px;
            border-right: 1px solid var(--divider-color);
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .stat-item:last-child {
            border-right: none;
        }

        .stat-val {
            font-family: 'Unbounded', sans-serif;
            font-weight: 900;
            font-size: 36px;
            line-height: 1;
            color: var(--primary-dark);
            margin-bottom: 4px;
        }

        .stat-val.gold-text {
            color: var(--accent-gold);
        }

        .stat-label {
            font-family: 'Unbounded', sans-serif;
            font-size: 9px;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: var(--text-muted);
        }

        .container {
            padding: 0;
        }

        /* TABS */
        .tabs {
            display: flex;
            background: #F9F4EA;
            border-bottom: 1px solid var(--divider-color);
            position: sticky;
            top: 105px; /* Adjust based on header height */
            z-index: 90;
        }

        .tab {
            flex: 1;
            text-align: center;
            padding: 16px;
            font-family: 'Unbounded', sans-serif;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-muted);
            cursor: pointer;
            border-bottom: 3px solid transparent;
        }

        .tab.active {
            color: var(--primary-dark);
            border-bottom-color: var(--accent-gold);
        }

        /* BOOKING LIST - NEWSPAPER STYLE */
        .bookings-list {
            padding-bottom: 40px;
        }

        .booking-row {
            margin-bottom: 0;
            animation: fadeUp 0.5s ease forwards;
            opacity: 0;
            transition: opacity 0.3s, background-color 0.3s;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .date-strip {
            background-color: var(--primary-dark);
            color: white;
            padding: 10px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .date-strip.done {
            background-color: #2A5A2A; /* Dark green */
        }
        
        .date-strip.cancelled {
            background-color: var(--divider-color);
        }

        .date-text {
            font-family: 'Unbounded', sans-serif;
            font-weight: 700;
            font-size: 12px;
            color: var(--accent-gold);
            text-transform: uppercase;
        }
        
        .date-strip.done .date-text {
            color: rgba(255, 255, 255, 0.7);
        }
        
        .date-strip.cancelled .date-text {
            color: var(--text-muted);
        }

        .price-text {
            font-family: 'Unbounded', sans-serif;
            font-weight: 900;
            font-size: 16px;
            color: white;
        }
        
        .date-strip.done .price-text {
            opacity: 0.7;
        }
        
        .date-strip.cancelled .price-text {
            color: var(--text-muted);
        }

        .currency {
            color: var(--accent-gold);
        }
        
        .date-strip.done .currency {
            color: white;
            opacity: 0.7;
        }
        
        .date-strip.cancelled .currency {
             color: var(--text-muted);
        }

        .info-row {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            border-bottom: 1px solid var(--divider-color);
            background-color: #FFFFFF;
        }
        
        .info-row:nth-child(even) {
            background-color: #F9F4EA;
        }
        
        .status-done .info-row, .status-cancelled .info-row {
            opacity: 0.6;
        }

        .label {
            width: 80px;
            flex-shrink: 0;
            font-family: 'Unbounded', sans-serif;
            font-size: 10px;
            text-transform: uppercase;
            color: var(--text-muted);
        }

        .value {
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 14px;
            color: var(--primary-dark);
            flex-grow: 1;
        }
        
        .username {
            color: var(--text-muted);
            font-weight: 400;
        }

        .action-row {
            display: flex;
            justify-content: space-between;
            gap: 8px;
            padding: 12px 16px;
            background-color: #F9F4EA;
            border-bottom: 3px solid var(--bg-color); /* Spacer */
        }
        
        .status-done .action-row, .status-cancelled .action-row {
            display: none;
        }

        .btn {
            flex: 1;
            padding: 12px;
            font-family: 'Unbounded', sans-serif;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            text-align: center;
            transition: all 0.2s;
        }

        .btn-done {
            background: transparent;
            border: 1px solid #2A5A2A;
            color: #2A5A2A;
        }
        
        .btn-done:active {
            background: #2A5A2A;
            color: white;
        }

        .btn-cancel {
            background: transparent;
            border: 1px solid var(--divider-color);
            color: var(--text-muted);
        }

        .btn-cancel:hover {
            border-color: #8B3A1A;
            color: #8B3A1A;
        }
        
        /* DATE HEADER */
        .date-section-header {
            font-family: 'Unbounded', sans-serif;
            font-weight: 900;
            font-size: 12px;
            color: var(--primary-dark);
            display: flex;
            align-items: center;
            padding: 20px 16px 8px 16px;
            text-transform: uppercase;
        }
        
        .date-section-header::before {
            content: '◆';
            color: var(--accent-gold);
            margin-right: 8px;
            font-size: 10px;
        }
        
        .date-section-header::after {
            content: '';
            flex-grow: 1;
            height: 1px;
            background-color: var(--divider-color);
            margin-left: 12px;
        }

        .loading {
            padding: 40px;
            text-align: center;
            font-family: 'Unbounded', sans-serif;
            color: var(--text-muted);
            font-size: 12px;
        }
        
        .empty-state {
            padding: 60px 20px;
            text-align: center;
        }
        
        .empty-icon {
            font-family: 'Unbounded', sans-serif;
            font-weight: 900;
            font-size: 48px;
            color: var(--accent-gold);
            display: block;
            margin-bottom: 16px;
        }
        
        .empty-title {
            font-family: 'Unbounded', sans-serif;
            font-weight: 700;
            font-size: 16px;
            color: var(--primary-dark);
            margin-bottom: 4px;
        }
        
        .empty-sub {
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            color: var(--text-muted);
        }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>

<header>
    <div class="header-top">
        <div>
            <span class="header-label">ПАВЛОДАР · CHOP</span>
            <h1>МАСТЕР / <span class="barber-name-highlight" id="barber-name">...</span></h1>
        </div>
        <div class="live-indicator">
            <div class="blink-dot"></div>
            <span class="live-text">LIVE</span>
        </div>
    </div>
    <div class="ticker-strip" id="ticker">
        CHOP BARBERSHOP · РАБОЧИЙ СТОЛ · ПАВЛОДАР · CHOP BARBERSHOP · РАБОЧИЙ СТОЛ · ПАВЛОДАР ·
    </div>
</header>

<div class="stats-row">
    <div class="stat-item">
        <span class="stat-val gold-text" id="stat-today">0</span>
        <span class="stat-label">СЕГОДНЯ</span>
    </div>
    <div class="stat-item">
        <span class="stat-val" id="stat-week">0</span>
        <span class="stat-label">НЕДЕЛЯ</span>
    </div>
    <div class="stat-item">
        <span class="stat-val" id="stat-total">0</span>
        <span class="stat-label">ВСЕГО</span>
    </div>
</div>

<div class="tabs">
    <div class="tab active" onclick="switchTab('today')">СЕГОДНЯ</div>
    <div class="tab" onclick="switchTab('week')">НЕДЕЛЯ</div>
    <div class="tab" onclick="switchTab('all')">ВСЕ</div>
</div>

<div class="container bookings-list">
    <div id="loading" class="loading">ЗАГРУЗКА...</div>
    <div id="bookings-list"></div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    let currentTab = 'today';
    let barberName = null;
    let allBookings = [];
    let masterId = null;

    async function init() {
        const params = new URLSearchParams(window.location.search);
        // Try getting master_id from URL first, then fallback to Telegram User ID
        const tgUser = window.Telegram?.WebApp?.initDataUnsafe?.user;
        masterId = params.get('master_id') || (tgUser ? String(tgUser.id) : null);
        
        if (!masterId) {
            const debugInfo = `
                <div style="font-size: 10px; color: red; margin-top: 10px; text-align: left;">
                    Debug Info:<br>
                    URL: ${window.location.href}<br>
                    Params: ${params.toString()}<br>
                    TG User: ${tgUser ? JSON.stringify(tgUser) : 'undefined'}<br>
                    InitData: ${window.Telegram?.WebApp?.initData ? 'present' : 'missing'}
                </div>
            `;
            document.getElementById('bookings-list').innerHTML = 
                '<div class="loading">Ошибка: Запустите через Telegram (нет master_id)</div>' + debugInfo;
            return;
        }
        
        // Initial fetch
        await fetchBookings();
        
        // Refresh every 30s
        setInterval(() => fetchBookings(true), 30000);
    }

    async function fetchBookings(silent = false) {
        if (!silent) document.getElementById('loading').classList.remove('hidden');
        
        try {
            // Fetch ALL bookings for this master to calculate stats correctly
            // We pass a timestamp to avoid caching
            let url = `/bookings/master-by-id?telegram_id=${masterId}&t=${Date.now()}`;
            
            const res = await fetch(url, { cache: "no-store" });
            const data = await res.json();
            
            if (!data.barber) {
                 document.getElementById('bookings-list').innerHTML = '<div class="loading">Мастер не найден</div>';
                 return;
            }

            barberName = data.barber;
            document.getElementById('barber-name').innerText = barberName;
            
            // Update ticker
            document.getElementById('ticker').innerText = `CHOP BARBERSHOP · РАБОЧИЙ СТОЛ · ${barberName.toUpperCase()} · ПАВЛОДАР · CHOP BARBERSHOP · РАБОЧИЙ СТОЛ · ${barberName.toUpperCase()} · ПАВЛОДАР ·`;
            
            allBookings = data.bookings;
            
            updateStats();
            if (!silent) renderList();
            
        } catch (e) {
            console.error(e);
            if (!silent) document.getElementById('bookings-list').innerHTML = '<div class="loading">Ошибка сети</div>';
        } finally {
            if (!silent) document.getElementById('loading').classList.add('hidden');
        }
    }

    function updateStats() {
        const now = new Date();
        const todayStr = now.toISOString().split('T')[0];
        
        // Today
        const todayCount = allBookings.filter(b => b.date === todayStr && b.status !== 'cancelled').length;
        
        // Week
        const todayDate = new Date(todayStr);
        const nextWeekDate = new Date(todayDate);
        nextWeekDate.setDate(todayDate.getDate() + 7);
        
        const weekCount = allBookings.filter(b => {
            if (b.status === 'cancelled') return false;
            const d = new Date(b.date);
            return d >= todayDate && d <= nextWeekDate;
        }).length;
        
        // Total (All active)
        const totalCount = allBookings.filter(b => b.status !== 'cancelled').length;
        
        document.getElementById('stat-today').innerText = todayCount;
        document.getElementById('stat-week').innerText = weekCount;
        document.getElementById('stat-total').innerText = totalCount;
    }

    function switchTab(tab) {
        currentTab = tab;
        document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
        event.currentTarget.classList.add('active');
        renderList();
    }
    
    function formatDate(dateStr) {
        const date = new Date(dateStr);
        const day = date.getDate();
        const months = ['марта', 'апреля', 'мая', 'июня', 'июля', 'августа', 'сентября', 'октября', 'ноября', 'декабря', 'января', 'февраля'];
        // Note: month index 0 is Jan, but array above starts with March? Let's fix standard RU
        const monthsRu = ['января', 'февраля', 'марта', 'апреля', 'мая', 'июня', 'июля', 'августа', 'сентября', 'октября', 'ноября', 'декабря'];
        const month = monthsRu[date.getMonth()];
        const days = ['Вс', 'Пн', 'Вт', 'Ср', 'Чт', 'Пт', 'Сб'];
        const weekDay = days[date.getDay()];
        return `${weekDay}, ${day} ${month}`;
    }

    function renderList() {
        const container = document.getElementById('bookings-list');
        container.innerHTML = '';
        
        let filtered = allBookings;
        const now = new Date();
        const todayStr = now.toISOString().split('T')[0];
        const todayDate = new Date(todayStr);

        if (currentTab === 'today') {
            filtered = allBookings.filter(b => b.date === todayStr);
        } else if (currentTab === 'week') {
            const nextWeekDate = new Date(todayDate);
            nextWeekDate.setDate(todayDate.getDate() + 7);
            filtered = allBookings.filter(b => {
                const d = new Date(b.date);
                return d >= todayDate && d <= nextWeekDate;
            });
        }
        
        if (filtered.length === 0) {
            container.innerHTML = `
                <div class="empty-state">
                    <span class="empty-icon">✂</span>
                    <div class="empty-title">Записей нет</div>
                    <div class="empty-sub">Свободный день 🎉</div>
                </div>
            `;
            return;
        }

        // Logic for "Today": Split Active vs Done
        if (currentTab === 'today') {
            const active = filtered.filter(b => b.status === 'new');
            const done = filtered.filter(b => b.status !== 'new');
            
            // Sort active ASC (earliest first)
            active.sort((a, b) => new Date(a.date + 'T' + a.time) - new Date(b.date + 'T' + b.time));
            // Sort done DESC (most recent finished first) - helps to see what was just done
            done.sort((a, b) => new Date(b.date + 'T' + b.time) - new Date(a.date + 'T' + a.time));
            
            if (active.length > 0) {
                const header = document.createElement('div');
                header.className = 'date-section-header';
                header.innerText = 'ОЖИДАЮТ';
                container.appendChild(header);
                active.forEach(b => container.appendChild(createBookingEl(b)));
            }
            
            if (done.length > 0) {
                const header = document.createElement('div');
                header.className = 'date-section-header';
                header.style.marginTop = '20px';
                header.style.opacity = '0.6';
                header.innerText = 'ЗАВЕРШЕННЫЕ';
                container.appendChild(header);
                done.forEach(b => container.appendChild(createBookingEl(b)));
            }
            
            return;
        }

        // Logic for Week/All: Chronological
        filtered.sort((a, b) => new Date(a.date + 'T' + a.time) - new Date(b.date + 'T' + b.time));
        
        let lastDate = null;
        filtered.forEach(b => {
            if (b.date !== lastDate) {
                 const dateHeader = document.createElement('div');
                 dateHeader.className = 'date-section-header';
                 dateHeader.innerText = formatDate(b.date);
                 container.appendChild(dateHeader);
                 lastDate = b.date;
            }
            container.appendChild(createBookingEl(b));
        });
    }

    function createBookingEl(b) {
        const isDone = b.status === 'done';
        const isCancelled = b.status === 'cancelled';
        let rowClass = '';
        if (isDone) rowClass = 'status-done';
        if (isCancelled) rowClass = 'status-cancelled';

        const el = document.createElement('div');
        el.className = `booking-row ${rowClass}`;
        
        const dateDisplay = (currentTab === 'today' ? '' : formatDate(b.date) + ' · ') + b.time;
        const priceDisplay = (b.price || 0).toLocaleString('ru-RU');
        
        let statusLabel = '';
        if (isDone) statusLabel = '— ВЫПОЛНЕНО ✓';
        if (isCancelled) statusLabel = '— ОТМЕНЕНО';

        el.innerHTML = `
            <div class="date-strip ${isDone ? 'done' : ''} ${isCancelled ? 'cancelled' : ''}">
                <span class="date-text">${dateDisplay} ${statusLabel}</span>
                <span class="price-text">${priceDisplay} <span class="currency">₸</span></span>
            </div>
            <div class="info-row">
                <span class="label">Клиент</span>
                <span class="value">
                    ${b.client_name || 'Клиент'} 
                    <span class="username">${b.username ? '(@' + b.username + ')' : ''}</span>
                </span>
            </div>
            <div class="info-row">
                <span class="label">Услуга</span>
                <span class="value">${b.service} · ${b.duration} мин</span>
            </div>
            <div class="action-row">
                <button class="btn btn-done" onclick="markDone('${b.id}')">✅ ВЫПОЛНЕНО</button>
                <button class="btn btn-cancel" onclick="cancelBooking('${b.id}')">❌ ОТМЕНИТЬ</button>
            </div>
        `;
        return el;
    }
    
    async function markDone(id) {
        if(!confirm('Отметить как выполнено?')) return;
        try {
            // Optimistic update
            const idx = allBookings.findIndex(b => b.id === id);
            if(idx !== -1) allBookings[idx].status = 'done';
            renderList();
            
            await fetch(`/bookings/${id}/done`, { method: 'PATCH' });
            fetchBookings(true);
        } catch (e) {
            console.error(e);
            // Revert if needed or just reload
            fetchBookings(true);
        }
    }

    async function cancelBooking(id) {
        if(!confirm('Отменить запись?')) return;
        try {
            // Optimistic update
            const idx = allBookings.findIndex(b => b.id === id);
            if(idx !== -1) allBookings[idx].status = 'cancelled';
            renderList();
            
            await fetch(`/bookings/${id}`, { method: 'DELETE' });
            fetchBookings(true);
        } catch (e) {
            console.error(e);
            fetchBookings(true);
        }
    }

    init();
</script>
</body>
</html>
