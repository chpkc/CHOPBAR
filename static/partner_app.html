<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CHOPBAR Партнер</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Unbounded:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #F5F1E8;
            --primary-dark: #1C1C1C;
            --accent-gold: #B8962E;
            --card-bg: #FFFFFF;
            --text-main: #1C1C1C;
            --text-muted: #666666;
            --border-color: #E0E0E0;
            --error-color: #D32F2F;
            --success-color: #388E3C;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }
        h1, h2, h3 { font-family: 'Unbounded', sans-serif; margin: 0; }
        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            padding: 20px;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            opacity: 1;
            transform: translateY(0);
            z-index: 1;
            transition: all 0.3s ease;
        }
        .screen.hidden {
            opacity: 0;
            transform: translateY(20px);
            pointer-events: none;
            z-index: 0;
        }
        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border-color);
        }
        .logo { font-size: 24px; font-weight: 900; text-transform: uppercase; }
        .shop-name { font-size: 14px; color: var(--text-muted); }
        /* Cards */
        .card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .card-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 12px;
            text-transform: uppercase;
        }
        /* Status toggle */
        .status-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .status-badge {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
        }
        .status-open { background: #E8F5E9; color: var(--success-color); }
        .status-closed { background: #FFEBEE; color: var(--error-color); }
        .toggle-btn {
            background: var(--accent-gold);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
        }
        /* Input lists */
        .input-row {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
        }
        .input-field {
            flex: 1;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 15px;
            outline: none;
        }
        .input-field:focus { border-color: var(--accent-gold); }
        .add-btn {
            background: var(--accent-gold);
            color: white;
            border: none;
            padding: 12px 16px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
        }
        .item-list {
            max-height: 150px;
            overflow-y: auto;
        }
        .item-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            background: var(--bg-color);
            border-radius: 6px;
            margin-bottom: 6px;
        }
        .item-id { font-family: monospace; font-size: 14px; }
        .remove-btn {
            background: none;
            border: none;
            color: var(--error-color);
            font-size: 18px;
            cursor: pointer;
            padding: 4px;
        }
        /* Invite screen */
        .invite-input {
            width: 100%;
            background: var(--card-bg);
            border: 2px solid var(--border-color);
            border-radius: 12px;
            padding: 18px;
            font-size: 18px;
            text-align: center;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 16px;
            outline: none;
        }
        .invite-input:focus { border-color: var(--accent-gold); }
        .error-text { color: var(--error-color); font-size: 13px; margin-top: -10px; margin-bottom: 16px; }
        .cta-button {
            background: var(--accent-gold);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 18px;
            width: 100%;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: auto;
        }
        .cta-button:disabled { opacity: 0.6; }
        .section { margin-bottom: 20px; }
        .d-none { display: none !important; }
    </style>
</head>
<body>
    <!-- Screen 1: Invite Code -->
    <div id="screen-invite" class="screen">
        <div style="text-align: center; margin-top: 40px; margin-bottom: 40px;">
            <div class="logo">CHOPBAR</div>
            <p style="color: var(--text-muted); margin-top: 8px;">Подключение барбершопа</p>
        </div>
        <p style="font-size: 15px; margin-bottom: 12px;">Введите инвайт-код:</p>
        <input type="text" id="input-invite" class="invite-input" placeholder="XXXX-XXXX" maxlength="20">
        <div id="invite-error" class="error-text"></div>
        <button id="btn-check-invite" class="cta-button" onclick="checkInvite()">Продолжить</button>
    </div>

    <!-- Screen 2: Registration -->
    <div id="screen-register" class="screen hidden">
        <div class="header">
            <div class="logo">CHOPBAR</div>
        </div>
        <div class="card">
            <div class="card-title">Информация о барбершопе</div>
            <input type="text" id="reg-name" class="input-field" placeholder="Название" style="width: 100%; margin-bottom: 10px;">
            <input type="text" id="reg-city" class="input-field" placeholder="Город" style="width: 100%; margin-bottom: 10px;">
            <input type="text" id="reg-phone" class="input-field" placeholder="Телефон" style="width: 100%; margin-bottom: 10px;">
            <input type="text" id="reg-instagram" class="input-field" placeholder="Instagram (необязательно)" style="width: 100%;">
        </div>
        <button class="cta-button" onclick="registerShop()">Создать барбершоп</button>
    </div>

    <!-- Screen 3: Dashboard -->
    <div id="screen-dashboard" class="screen hidden">
        <div class="header">
            <div>
                <div class="logo">CHOPBAR</div>
                <div id="dashboard-shop-name" class="shop-name"></div>
            </div>
        </div>

        <!-- Status -->
        <div class="card">
            <div class="status-row">
                <div>
                    <div class="card-title">Статус</div>
                    <span id="shop-status" class="status-badge status-open">Открыт</span>
                </div>
                <button id="btn-toggle-status" class="toggle-btn" onclick="toggleStatus()">Закрыть</button>
            </div>
        </div>

        <!-- Admins -->
        <div class="card">
            <div class="card-title">Администраторы</div>
            <div class="input-row">
                <input type="text" id="input-admin" class="input-field" placeholder="Telegram ID">
                <button class="add-btn" onclick="addAdmin()">+</button>
            </div>
            <div id="admin-list" class="item-list"></div>
        </div>

        <!-- Barbers -->
        <div class="card">
            <div class="card-title">Мастера</div>
            <div class="input-row">
                <input type="text" id="input-barber-name" class="input-field" placeholder="Имя мастера">
            </div>
            <div class="input-row">
                <input type="text" id="input-barber-id" class="input-field" placeholder="Telegram ID">
                <button class="add-btn" onclick="addBarber()">+</button>
            </div>
            <div id="barber-list" class="item-list"></div>
        </div>

        <!-- Links -->
        <div class="card">
            <div class="card-title">Ссылки</div>
            <div style="font-size: 13px; color: var(--text-muted); margin-bottom: 8px;">Ссылка для клиентов:</div>
            <div id="client-link" style="font-size: 12px; word-break: break-all; background: var(--bg-color); padding: 8px; border-radius: 6px; margin-bottom: 12px;"></div>
            <div style="font-size: 13px; color: var(--text-muted); margin-bottom: 8px;">Ссылка для мастеров:</div>
            <div id="barber-link" style="font-size: 12px; word-break: break-all; background: var(--bg-color); padding: 8px; border-radius: 6px;"></div>
        </div>

        <button class="cta-button" onclick="logout()" style="background: var(--text-muted);">Выйти</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        let validInviteCode = null;
        let currentShop = null;
        let userId = tg.initDataUnsafe?.user?.id || null;

        // URL params check
        const urlParams = new URLSearchParams(window.location.search);
        const urlInvite = urlParams.get('invite');
        if (urlInvite) {
            document.getElementById('input-invite').value = urlInvite.toUpperCase();
        }

        // Auto-uppercase invite
        document.getElementById('input-invite').addEventListener('input', function(e) {
            this.value = this.value.toUpperCase();
            document.getElementById('invite-error').innerText = '';
        });

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        async function checkInvite() {
            const input = document.getElementById('input-invite');
            const code = input.value.trim();
            const errorDiv = document.getElementById('invite-error');

            if (!code) {
                errorDiv.innerText = 'Введите код';
                return;
            }

            try {
                const res = await fetch(`/api/check-invite?code=${encodeURIComponent(code)}`);
                const data = await res.json();

                if (data.valid) {
                    validInviteCode = code;
                    // Check if user already has a shop
                    const shopRes = await fetch(`/api/shop-by-owner?telegram_id=${userId}`);
                    const shopData = await shopRes.json();
                    
                    if (shopData.shop) {
                        currentShop = shopData.shop;
                        loadDashboard();
                    } else {
                        showScreen('screen-register');
                    }
                } else {
                    errorDiv.innerText = 'Неверный или уже использованный код';
                }
            } catch (err) {
                errorDiv.innerText = 'Ошибка сети. Попробуйте позже.';
            }
        }

        async function registerShop() {
            const name = document.getElementById('reg-name').value.trim();
            const city = document.getElementById('reg-city').value.trim();
            const phone = document.getElementById('reg-phone').value.trim();
            const instagram = document.getElementById('reg-instagram').value.trim();

            if (!name || !city || !phone) {
                tg.showAlert('Заполните обязательные поля');
                return;
            }

            try {
                const res = await fetch('/api/register-barbershop', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        name, city, phone, instagram,
                        invite_code: validInviteCode,
                        owner_telegram_id: userId
                    })
                });
                const data = await res.json();
                
                if (data.success) {
                    currentShop = data.shop;
                    loadDashboard();
                } else {
                    tg.showAlert(data.error || 'Ошибка регистрации');
                }
            } catch (err) {
                tg.showAlert('Ошибка сети');
            }
        }

        function loadDashboard() {
            document.getElementById('dashboard-shop-name').innerText = currentShop.name;
            document.getElementById('client-link').innerText = `${window.location.origin}/static/index.html?slug=${currentShop.slug}`;
            document.getElementById('barber-link').innerText = `${window.location.origin}/static/barber.html?slug=${currentShop.slug}`;
            
            updateStatusUI(currentShop.is_active !== false);
            loadAdmins();
            loadBarbers();
            
            showScreen('screen-dashboard');
        }

        function updateStatusUI(isOpen) {
            const statusEl = document.getElementById('shop-status');
            const btnEl = document.getElementById('btn-toggle-status');
            
            if (isOpen) {
                statusEl.className = 'status-badge status-open';
                statusEl.innerText = 'Открыт';
                btnEl.innerText = 'Закрыть';
            } else {
                statusEl.className = 'status-badge status-closed';
                statusEl.innerText = 'Закрыт';
                btnEl.innerText = 'Открыть';
            }
        }

        async function toggleStatus() {
            const newStatus = document.getElementById('shop-status').innerText !== 'Открыт';
            
            try {
                const res = await fetch(`/api/barbershop/${currentShop.id}/status`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ is_active: newStatus })
                });
                
                if (res.ok) {
                    updateStatusUI(newStatus);
                }
            } catch (err) {
                tg.showAlert('Ошибка обновления статуса');
            }
        }

        async function addAdmin() {
            const id = document.getElementById('input-admin').value.trim();
            if (!id) return;

            try {
                const res = await fetch(`/api/barbershop/${currentShop.id}/admins`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ telegram_id: id })
                });
                
                if (res.ok) {
                    document.getElementById('input-admin').value = '';
                    loadAdmins();
                }
            } catch (err) {
                tg.showAlert('Ошибка добавления админа');
            }
        }

        async function loadAdmins() {
            try {
                const res = await fetch(`/api/barbershop/${currentShop.id}/admins`);
                const data = await res.json();
                
                const list = document.getElementById('admin-list');
                list.innerHTML = data.admins?.map(a => `
                    <div class="item-row">
                        <span class="item-id">${a.telegram_id}</span>
                        <button class="remove-btn" onclick="removeAdmin('${a.telegram_id}')">×</button>
                    </div>
                `).join('') || '<div style="color: var(--text-muted); padding: 10px;">Нет администраторов</div>';
            } catch (err) {
                console.error('Error loading admins:', err);
            }
        }

        async function removeAdmin(id) {
            try {
                await fetch(`/api/barbershop/${currentShop.id}/admins/${id}`, { method: 'DELETE' });
                loadAdmins();
            } catch (err) {
                tg.showAlert('Ошибка удаления');
            }
        }

        async function addBarber() {
            const name = document.getElementById('input-barber-name').value.trim();
            const telegramId = document.getElementById('input-barber-id').value.trim();
            
            if (!name || !telegramId) {
                tg.showAlert('Введите имя и Telegram ID');
                return;
            }

            try {
                const res = await fetch(`/api/barbershop/${currentShop.id}/barbers`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, telegram_id: telegramId })
                });
                
                if (res.ok) {
                    document.getElementById('input-barber-name').value = '';
                    document.getElementById('input-barber-id').value = '';
                    loadBarbers();
                }
            } catch (err) {
                tg.showAlert('Ошибка добавления мастера');
            }
        }

        async function loadBarbers() {
            try {
                const res = await fetch(`/api/barbershop/${currentShop.id}/barbers`);
                const data = await res.json();
                
                const list = document.getElementById('barber-list');
                list.innerHTML = data.barbers?.map(b => `
                    <div class="item-row">
                        <div>
                            <div style="font-weight: 600;">${b.name}</div>
                            <div style="font-size: 12px; color: var(--text-muted);">ID: ${b.telegram_id || 'не привязан'}</div>
                        </div>
                        <button class="remove-btn" onclick="removeBarber('${b.id}')">×</button>
                    </div>
                `).join('') || '<div style="color: var(--text-muted); padding: 10px;">Нет мастеров</div>';
            } catch (err) {
                console.error('Error loading barbers:', err);
            }
        }

        async function removeBarber(id) {
            try {
                await fetch(`/api/barbershop/${currentShop.id}/barbers/${id}`, { method: 'DELETE' });
                loadBarbers();
            } catch (err) {
                tg.showAlert('Ошибка удаления');
            }
        }

        function logout() {
            currentShop = null;
            validInviteCode = null;
            showScreen('screen-invite');
        }

        // Enter key handlers
        document.getElementById('input-invite').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') checkInvite();
        });
    </script>
</body>
</html>
